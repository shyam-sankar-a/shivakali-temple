<div class="admin-page">
  <div class="page-header">
    <h1 class="page-title">Poojas</h1>
    <button class="btn btn-primary" (click)="openAdd()">+ Add Pooja</button>
  </div>

  <div class="cards-grid">
    @for (pooja of poojas(); track pooja._id) {
      <div class="card pooja-card">
        <div class="pooja-header">
          <h3>{{ pooja.name }}</h3>
          <span class="badge">{{ pooja.deity }}</span>
        </div>
        <p>{{ pooja.description }}</p>
        <div class="pooja-meta">
          <span>₹{{ pooja.price }}</span>
          @if (pooja.duration) { <span>⏱ {{ pooja.duration }}</span> }
          <span class="status" [class.active]="pooja.isActive">{{ pooja.isActive ? 'Active' : 'Inactive' }}</span>
        </div>
        <div class="card-actions">
          <button class="action-btn edit" (click)="openEdit(pooja)">Edit</button>
          <button class="action-btn delete" (click)="delete(pooja._id)">Delete</button>
        </div>
      </div>
    }
  </div>
</div>

@if (showForm()) {
  <div class="modal-overlay" (click)="closeForm()">
    <div class="modal" (click)="$event.stopPropagation()">
      <h2>{{ editing() ? 'Edit' : 'Add' }} Pooja</h2>
      <div class="form-group"><label>Name *</label><input type="text" [(ngModel)]="form.name" placeholder="Pooja name"></div>
      <div class="form-group"><label>Description</label><textarea [(ngModel)]="form.description" rows="3"></textarea></div>
      <div class="form-group"><label>Price (₹) *</label><input type="number" [(ngModel)]="form.price" min="0"></div>
      <div class="form-group"><label>Duration</label><input type="text" [(ngModel)]="form.duration" placeholder="e.g. 45 minutes"></div>
      <div class="form-group">
        <label>Deity</label>
        <select [(ngModel)]="form.deity">
          <option value="Kali">Kali</option>
          <option value="Durga">Durga</option>
          <option value="Both">Both</option>
        </select>
      </div>
      <div class="form-group"><label>Timings (comma-separated)</label><input type="text" [(ngModel)]="form.timings" placeholder="6:00 AM, 12:00 PM"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" (click)="closeForm()">Cancel</button>
        <button class="btn btn-primary" (click)="save()">{{ editing() ? 'Update' : 'Create' }}</button>
      </div>
    </div>
  </div>
}
