<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <span class="om">ॐ</span>
      <h1>Temple Admin</h1>
      <p>Shivakali Amba Bhagavathi Temple</p>
    </div>

    <form (ngSubmit)="login($event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="admin@shivakali.temple" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>

      @if (error()) { <p class="error-msg">{{ error() }}</p> }

      <button type="submit" class="btn btn-primary login-btn" [disabled]="loading()">
        @if (loading()) { <span class="spinner"></span> } @else { Sign In }
      </button>
    </form>
  </div>
</div>
