<div class="admin-page">
  <div class="page-header">
    <h1 class="page-title">Admin Users</h1>
    @if (auth.isSuperAdmin()) {
      <button class="btn btn-primary" (click)="showForm.set(true)">+ Add Admin</button>
    }
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        @for (user of users(); track user._id) {
          <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td><span class="badge role">{{ user.role }}</span></td>
            <td><span class="badge" [class.active-badge]="user.adminStatus === 'active'">{{ user.adminStatus }}</span></td>
            <td>
              @if (auth.isSuperAdmin() && user.role !== 'superadmin') {
                <button class="action-btn" (click)="toggleStatus(user)">
                  {{ user.adminStatus === 'active' ? 'Deactivate' : 'Activate' }}
                </button>
              }
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

@if (showForm()) {
  <div class="modal-overlay" (click)="showForm.set(false)">
    <div class="modal" (click)="$event.stopPropagation()">
      <h2>Add Admin User</h2>
      <div class="form-group"><label>Name *</label><input type="text" [(ngModel)]="form.name"></div>
      <div class="form-group"><label>Email *</label><input type="email" [(ngModel)]="form.email"></div>
      <div class="form-group"><label>Password *</label><input type="password" [(ngModel)]="form.password"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" (click)="showForm.set(false)">Cancel</button>
        <button class="btn btn-primary" (click)="createAdmin()">Create</button>
      </div>
    </div>
  </div>
}
