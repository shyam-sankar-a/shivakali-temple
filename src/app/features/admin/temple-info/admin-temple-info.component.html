<div class="admin-page">
  <h1 class="page-title">Temple Information</h1>
  @if (saved()) { <p class="success-msg">✓ Saved successfully</p> }

  <div class="form-sections">
    <div class="form-section card">
      <h3>General</h3>
      <div class="form-group"><label>Temple Name</label><input type="text" [(ngModel)]="info['templeName']"></div>
      <div class="form-group"><label>Address</label><textarea [(ngModel)]="info['address']" rows="3"></textarea></div>
      <div class="form-group"><label>Phone</label><input type="tel" [(ngModel)]="info['phone']"></div>
      <div class="form-group"><label>Email</label><input type="email" [(ngModel)]="info['email']"></div>
    </div>

    <div class="form-section card">
      <h3>Bank Details</h3>
      <div class="form-group"><label>Bank Name</label><input type="text" [(ngModel)]="info['bankName']"></div>
      <div class="form-group"><label>Account Number</label><input type="text" [(ngModel)]="info['accountNo']"></div>
      <div class="form-group"><label>IFSC Code</label><input type="text" [(ngModel)]="info['ifscCode']"></div>
      <div class="form-group"><label>UPI ID</label><input type="text" [(ngModel)]="info['upiId']"></div>
    </div>

    <div class="form-section card">
      <h3>Hero Image</h3>
      <div class="form-group">
        <label>Upload Hero Image</label>
        <input type="file" accept="image/*" (change)="onHeroSelected($event)" [disabled]="uploadingHero()">
        @if (uploadingHero()) { <span class="upload-hint">Uploading…</span> }
        @if (info['heroImageUrl']) { <img [src]="info['heroImageUrl']" alt="Hero preview" class="hero-preview"> }
      </div>
    </div>

    <div class="form-section card">
      <h3>Map</h3>
      <div class="form-group">
        <label>Google Maps Embed URL</label>
        <input type="url" [(ngModel)]="info['mapEmbedUrl']" placeholder="https://www.google.com/maps/embed?pb=…">
        <small class="field-hint">Paste the URL from Google Maps → Share → Embed a map → copy only the <code>src</code> value</small>
      </div>
    </div>
  </div>

  <div class="save-row">
    <button class="btn btn-primary" (click)="save()">Save Changes</button>
  </div>
</div>
