<div class="admin-page">
  <div class="page-header">
    <h1 class="page-title">Employees</h1>
    <button class="btn btn-primary" (click)="openAdd()">+ Add Employee</button>
  </div>

  <div class="cards-grid">
    @for (emp of employees(); track emp._id) {
      <div class="card emp-card">
        @if (emp.imageUrl) { <img [src]="emp.imageUrl" [alt]="emp.name" class="emp-photo"> }
        @else { <div class="emp-avatar">{{ emp.name[0] }}</div> }
        <div class="emp-info">
          <h3>{{ emp.name }}</h3>
          <span class="emp-role">{{ emp.role }}</span>
          @if (emp.phone) { <p>📞 {{ emp.phone }}</p> }
          @if (emp.email) { <p>✉️ {{ emp.email }}</p> }
        </div>
        <div class="card-actions">
          <button class="action-btn edit" (click)="openEdit(emp)">Edit</button>
          <button class="action-btn delete" (click)="delete(emp._id)">Delete</button>
        </div>
      </div>
    }
  </div>
</div>

@if (showForm()) {
  <div class="modal-overlay" (click)="closeForm()">
    <div class="modal" (click)="$event.stopPropagation()">
      <h2>{{ editing() ? 'Edit' : 'Add' }} Employee</h2>
      <div class="form-group"><label>Name *</label><input type="text" [(ngModel)]="form.name"></div>
      <div class="form-group"><label>Role *</label><input type="text" [(ngModel)]="form.role" placeholder="e.g. Head Priest"></div>
      <div class="form-group"><label>Description</label><textarea [(ngModel)]="form.description" rows="2"></textarea></div>
      <div class="form-group"><label>Photo URL</label><input type="url" [(ngModel)]="form.imageUrl"></div>
      <div class="form-group"><label>Phone</label><input type="tel" [(ngModel)]="form.phone"></div>
      <div class="form-group"><label>Email</label><input type="email" [(ngModel)]="form.email"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" (click)="closeForm()">Cancel</button>
        <button class="btn btn-primary" (click)="save()">{{ editing() ? 'Update' : 'Create' }}</button>
      </div>
    </div>
  </div>
}
